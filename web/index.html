<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">

  <title>Oligon Technology · Custom software engineering</title>
  <meta name="description" content="Oligon Technology builds custom software, AI agents and digital products. Senior engineers, modern stack, real outcomes.">

  <!-- Open Graph -->
  <meta property="og:title" content="Oligon Technology · Custom software engineering">
  <meta property="og:description" content="Senior engineers building custom software, AI agents and digital products that ship.">
  <meta property="og:url" content="https://oligontech.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <!-- iOS / PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Oligon">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect a CDN do CanvasKit do Google (zero custo de banda pra nós) -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">

  <style>
    /* Splash inline (não bloqueia render do bundle) */
    html, body { margin:0; padding:0; background:#0A0A0A; color:#fff; height:100%; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    #splash {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:16px;
      background:#0A0A0A; z-index:9999;
      transition: opacity .4s ease;
    }
    #splash.hidden { opacity:0; pointer-events:none; }
    .splash-logo {
      font-size:24px; font-weight:800; letter-spacing:-0.5px;
      background:linear-gradient(135deg,#00FFA3,#7C3AED);
      -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .splash-pulse {
      width:32px; height:2px; background:#00FFA3;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:.2; transform:scaleX(.4); }
      50% { opacity:1; transform:scaleX(1); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="splash-logo">Oligon.tech</div>
    <div class="splash-pulse"></div>
  </div>

  <script>
    // Esconde splash quando Flutter renderizar
    window.addEventListener('flutter-first-frame', () => {
      const s = document.getElementById('splash');
      if (s) {
        s.classList.add('hidden');
        setTimeout(() => s.remove(), 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
